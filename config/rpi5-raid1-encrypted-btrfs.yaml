# Продакшн конфигурация для RAID1 образа с шифрованием на Raspberry Pi 5 (btrfs)
# Использует слой image-raid с LUKS2 шифрованием для безопасного хранения

device:
  layer: rpi5
  hostname: rpi5-raid1-secure-btrfs
  user: pi

image:
  layer: image-raid
  boot_part_size: 200M
  root_part_size: auto
  name: rpi5-raid1-encrypted-btrfs
  compression: zstd

  # RAID конфигурация с шифрованием
  raid_level: RAID1
  raid_devices: 2
  rootfs_type: btrfs
  encryption_enabled: y
  pmap: crypt

  # Параметры шифрования
  key_method: random
  key_size: 512
  key_file: /boot/luks-key

  # Оптимизация производительности для продакшн
  apt_cache: y
  ccache: y
  ccache_size: 5G
  parallel_jobs: 4
  image_size_optimization: y

layer:
  base: bookworm-minbase

# Настройка артефактов (требуется для слоя image-raid)
artefact:
  target_name: rpi5-raid1-secure-btrfs
  version: 1.0.0

# Локализация (требуется для слоя image-raid)
locale:
  timezone: Europe/Moscow
  default: ru_RU.UTF-8
  keyboard_layout: Russian
  keyboard_keymap: ru
