# Тестовая конфигурация для RAID1 образа на Raspberry Pi 5
# Использует слой image-raid для создания RAID1 массива с внешними дисками

device:
  layer: rpi5
  hostname: rpi5-raid1-test
  user: pi

image:
  layer: image-raid
  boot_part_size: 200M
  root_part_size: 100%
  name: rpi5-raid1-image
  compression: zstd
  
  # RAID конфигурация
  raid_level: RAID1
  raid_devices: 2
  rootfs_type: ext4
  encryption_enabled: n
  pmap: clear
  
  # Оптимизация производительности (опционально)
  apt_cache: n
  ccache: n
  parallel_jobs: 0
  image_size_optimization: n

layer:
  base: bookworm-minbase

# Настройка артефактов (требуется для слоя image-raid)
artefact:
  target_name: rpi5-raid1-test
  version: 1.0.0

# Локализация (требуется для слоя image-raid)
locale:
  timezone: UTC
  default: en_US.UTF-8
  keyboard_layout: us
  keyboard_keymap: us

