[defaults]
	# Оптимизированные базовые настройки для RAID/SSD систем
	base_features = sparse_super,large_file,filetype,resize_inode,dir_index,ext_attr
	default_mntopts = acl,user_xattr
	enable_periodic_fsck = 0
	blocksize = 4096
	inode_size = 256
	# Оптимизированное соотношение для RAID систем (больше inode'ов для метаданных)
	inode_ratio = 8192

[fs_types]
	ext3 = {
		features = has_journal
	}
	ext4 = {
		features = has_journal,extent,huge_file,flex_bg,metadata_csum,64bit,dir_nlink,extra_isize
		# Оптимизации для SSD производительности
		options = discard
		# Настройки для RAID1 (chunk-size 512K, blocksize 4K)
		inode_size = 256
		inode_ratio = 8192
	}

	# Специфические настройки для RAID1 массивов
	raid1 = {
		features = has_journal,extent,huge_file,flex_bg,metadata_csum,64bit,dir_nlink,extra_isize
		options = discard
		# RAID1 оптимизации: stripe-width = chunk-size(512K) / blocksize(4K) = 128
		stripe_width = 128
		stride = 128
		inode_ratio = 8192
	}

	# Оптимизации для btrfs на SSD
	btrfs = {
		features = has_journal,extent,huge_file,flex_bg,metadata_csum,64bit,dir_nlink,extra_isize
		options = discard,ssd
		inode_ratio = 4096
	}

	# Оптимизации для f2fs на флеш-памяти
	f2fs = {
		features = has_journal,extent,huge_file,flex_bg,metadata_csum,64bit,dir_nlink,extra_isize
		options = discard,lazytime,background_gc=on
		inode_ratio = 4096
	}
	small = {
		blocksize = 1024
		inode_ratio = 4096
	}
	floppy = {
		blocksize = 1024
		inode_ratio = 8192
	}
	big = {
		inode_ratio = 32768
	}
	huge = {
		inode_ratio = 65536
	}
	news = {
		inode_ratio = 4096
	}
	largefile = {
		inode_ratio = 1048576
		blocksize = -1
	}
	largefile4 = {
		inode_ratio = 4194304
		blocksize = -1
	}
	hurd = {
	     blocksize = 4096
	     inode_size = 128
	     warn_y2038_dates = 0
	}
