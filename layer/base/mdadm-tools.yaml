# METABEGIN
# X-Env-Layer-Name: sys-misc-mdadm-tools
# X-Env-Layer-Category: foundation
# X-Env-Layer-Desc: Extended MDADM array management tools and monitoring
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: raid-base
# METAEND
---
mmdebstrap:
  packages:
    - smartmontools
    - lsscsi
  setup-hooks:
    - echo "Настройка расширенных инструментов MDADM"
  customize-hooks:
    - |
      # Настройка мониторинга RAID массивов
      mkdir -p $1/usr/local/bin
      cat > $1/usr/local/bin/raid-monitor.sh << 'EOF'
      #!/bin/bash
      # Мониторинг состояния RAID массивов
      mdadm --detail --scan > /dev/null 2>&1 || exit 1
      cat /proc/mdstat
      EOF
      chmod +x $1/usr/local/bin/raid-monitor.sh
    - echo "Расширенные инструменты MDADM настроены"
