# METABEGIN
# X-Env-Layer-Name: ufw-minimal
# X-Env-Layer-Category: security
# X-Env-Layer-Desc: Uncomplicated Firewall with default deny-incoming policy
# X-Env-Layer-Version: 1.0.0
# X-Env-Layer-Requires: locale-base
# X-Env-Layer-Provides: firewall
# X-Env-VarPrefix: ufw
#
# X-Env-Var-enable: y
# X-Env-Var-enable-Desc: Enable UFW firewall with default configuration
# X-Env-Var-enable-Required: n
# X-Env-Var-enable-Valid: bool
# X-Env-Var-enable-Set: immediate
# METAEND
---
mmdebstrap:
  includes:
    - ufw
    
  customize-hooks:
    - |
      if [ "${IGconf_ufw_enable:-n}" != "y" ]; then
        echo "UFW disabled by configuration"
        exit 0
      fi
      
      echo "Installing UFW with default Debian configuration..."
      
      # PHASE 1: Validation
      # Check that ufw is installed
      if ! chroot "$1" dpkg -l ufw | grep -q "^ii"; then
        echo "❌ ERROR: ufw not installed"
        exit 1
      fi
      echo "✅ UFW validated"
      
      # PHASE 2: Backup
      TIMESTAMP=$(date +%Y%m%d-%H%M%S)
      BACKUP_DIR="/root/rpi-image-gen-backups/$TIMESTAMP"
      mkdir -p "$1$BACKUP_DIR"
      
      if [ -d "$1/etc/ufw" ]; then
        cp -a "$1/etc/ufw" "$1$BACKUP_DIR/" 2>/dev/null || true
        echo "Backup created: $BACKUP_DIR/ufw"
      fi
      
      # PHASE 3: Configuration (minimal, idempotent)
      # Set default policies ONLY (no rules application during build)
      
      # Create basic configuration file
      cat > "$1/etc/ufw/ufw.conf" << 'EOF'
# UFW configuration
# Generated by rpi-image-gen ufw-minimal layer

# Set to yes to start on boot
ENABLED=yes

# Logging level
LOGLEVEL=low
EOF

      # Set default policies in config (not applying rules yet)
      cat > "$1/etc/default/ufw" << 'EOF'
# UFW defaults
# Generated by rpi-image-gen ufw-minimal layer

# Set default input policy to DROP
DEFAULT_INPUT_POLICY="DROP"

# Set default output policy to ACCEPT
DEFAULT_OUTPUT_POLICY="ACCEPT"

# Set default forward policy to DROP
DEFAULT_FORWARD_POLICY="DROP"

# Enable IPv6
IPV6=yes

# Manage built-in rules
MANAGE_BUILTINS=no
EOF

      echo "✅ UFW default policies configured"
      echo "   Input: DROP, Output: ACCEPT, Forward: DROP"
      echo "   IPv6: enabled"
      
      # PHASE 4: No validation needed (just config files)
      
      # PHASE 5: Enable service (NOT start!)
      # CRITICAL: Only enable, do NOT run "ufw enable" during build
      chroot "$1" systemctl enable ufw
      
      echo ""
      echo "✅ UFW installed with default deny-all configuration"
      echo "   ⚠️  IMPORTANT: Will start on first boot with NO rules"
      echo "   ⚠️  You MUST configure rules before first boot:"
      echo "      1. Mount the image after build"
      echo "      2. Add rules: ufw allow ssh (or other services)"
      echo "      3. Or disable UFW: systemctl disable ufw"
      echo ""
      echo "   Example post-build configuration:"
      echo "   $ sudo mount /dev/sdX2 /mnt"
      echo "   $ sudo chroot /mnt"
      echo "   $ ufw allow ssh"
      echo "   $ ufw allow http"
      echo "   $ ufw allow https"
      echo "   $ exit"
      echo "   $ sudo umount /mnt"

